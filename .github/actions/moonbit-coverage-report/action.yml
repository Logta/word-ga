name: MoonBit Coverage Report
description: Run MoonBit tests with coverage and post the summary as a PR comment

inputs:
  working-directory:
    description: Path to the MoonBit project directory
    required: false
    default: moonbit

runs:
  using: composite
  steps:
    - name: Run MoonBit coverage
      shell: bash
      run: |
        cd "${{ inputs.working-directory }}"
        moon test --enable-coverage
        moon coverage report -f summary \
          | tee "$GITHUB_WORKSPACE/.moonbit-coverage.txt"

    - name: Post PR comment
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const raw = fs.readFileSync(
            `${process.env.GITHUB_WORKSPACE}/.moonbit-coverage.txt`,
            'utf8',
          ).trim();

          // Extract overall percentage for the header (e.g. "98.60%")
          const match = raw.match(/(\d+\.\d+)%/g);
          const overall = match ? match[match.length - 1] : null;
          const badge = overall
            ? ` — **${overall}**`
            : '';

          const MARKER = '<!-- moonbit-coverage-report -->';
          const body = [
            MARKER,
            `## 🌙 MoonBit Coverage${badge}`,
            '',
            '```',
            raw,
            '```',
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(MARKER));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
