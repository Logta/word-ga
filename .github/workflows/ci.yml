name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-moonbit:
    name: MoonBit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Format check
        run: cd moonbit && moon fmt --check

      - name: Run MoonBit tests
        run: cd moonbit && moon test --target wasm-gc

      - name: MoonBit Coverage Report
        uses: ./.github/actions/moonbit-coverage-report
        if: github.event_name == 'pull_request'

  test-ts:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format check (oxfmt)
        run: bun run fmt:check

      - name: Lint (oxlint)
        run: bun run lint

      - name: Type check
        run: bunx tsc -b --noEmit

      - name: Run TypeScript tests with coverage
        run: bun run test:coverage

      - name: TypeScript Coverage Report
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-moonbit, test-ts]
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
