name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-moonbit:
    name: MoonBit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Format check
        run: cd moonbit && moon fmt --check

      - name: Run MoonBit tests
        run: cd moonbit && moon test --target wasm-gc

      - name: MoonBit coverage
        run: |
          cd moonbit
          moon test --enable-coverage
          moon coverage report -f summary | tee ../coverage-moonbit.txt

      - name: Upload MoonBit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-moonbit
          path: coverage-moonbit.txt

  test-ts:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format check (oxfmt)
        run: bun run fmt:check

      - name: Lint (oxlint)
        run: bun run lint

      - name: Type check
        run: bunx tsc -b --noEmit

      - name: Run TypeScript tests with coverage
        run: |
          NO_COLOR=1 bun run test:coverage 2>&1 \
            | grep -v '^\[moonbit\]' \
            | tee coverage-ts.txt

      - name: Upload TypeScript coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ts
          path: coverage-ts.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-moonbit, test-ts]
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  coverage-comment:
    name: Coverage Comment
    runs-on: ubuntu-latest
    needs: [test-moonbit, test-ts]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download MoonBit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-moonbit

      - name: Download TypeScript coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-ts

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const ts  = fs.readFileSync('coverage-ts.txt',      'utf8').trim();
            const mbt = fs.readFileSync('coverage-moonbit.txt', 'utf8').trim();

            const MARKER = '<!-- coverage-report -->';
            const body = [
              MARKER,
              '## 📊 Coverage Report',
              '',
              '### TypeScript (vitest / v8)',
              '```',
              ts,
              '```',
              '',
              '### MoonBit',
              '```',
              mbt,
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
