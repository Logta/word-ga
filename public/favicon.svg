<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: dark rounded square matching app theme -->
  <rect width="32" height="32" rx="7" fill="#111827"/>

  <!-- Base pair rungs (drawn behind strands) -->
  <line x1="9" y1="6"  x2="23" y2="6"  stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="9" y1="13" x2="23" y2="13" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="9" y1="19" x2="23" y2="19" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="9" y1="26" x2="23" y2="26" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>

  <!-- Strand A: cyan — oscillates left→right→left -->
  <path d="M 9,2 C 9,8 23,11 23,16 S 9,21 9,30"
        fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Strand B: green — opposite phase -->
  <path d="M 23,2 C 23,8 9,11 9,16 S 23,21 23,30"
        fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
</svg>
